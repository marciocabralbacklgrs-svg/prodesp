{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poupatempo — Buscador</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Rawline", sans-serif;
            background: #ffffff;
            color: #303030;
            min-height: 100vh;
        }

        main { /*position: relative; }*/
            max-width: 1024px;
            position: relative;
            max-width: 1024px;
            margin: 0 auto;
        }

        /* ── Results section ── */
        #results-section { position: relative; }

        #results-section.rs-hidden    { display: none; }

        #results-section.rs-wipe-down {
            animation: rs-wipe-down 380ms ease forwards;
            pointer-events: none;
        }
        #results-section.rs-reveal-up {
            animation: rs-reveal-up 380ms ease forwards;
        }

        @keyframes rs-wipe-down {
            from { clip-path: inset(0 0 0 0); }
            to   { clip-path: inset(100% 0 0 0); }
        }
        @keyframes rs-reveal-up {
            from { clip-path: inset(100% 0 0 0); }
            to   { clip-path: inset(0 0 0 0); }
        }

        /* ── Agentforce section ── */
        #agentforce-section { display: none; }

        #agentforce-section.af-overlap {
            display: block;
            position: absolute;
            left: 0;
            right: 0;
        }
        #agentforce-section.af-active {
            display: block;
            position: relative;
        }

        #agentforce-section.af-reveal-down {
            animation: af-reveal-down 380ms ease forwards;
        }
        #agentforce-section.af-wipe-up {
            animation: af-wipe-up 380ms ease forwards;
            pointer-events: none;
        }

        @keyframes af-reveal-down {
            from { clip-path: inset(0 0 100% 0); }
            to   { clip-path: inset(0 0 0 0); }
        }
        @keyframes af-wipe-up {
            from { clip-path: inset(0 0 0 0); }
            to   { clip-path: inset(0 0 100% 0); }
        }
    </style>
</head>
<body>

    <main>
        <pt-buscador-campo></pt-buscador-campo>

        <section id="results-section">
            <pt-buscador-indice-pesquisa id="buscador"></pt-buscador-indice-pesquisa>
        </section>

        <section id="agentforce-section">
            <pt-buscador-agentforce id="agentforce"></pt-buscador-agentforce>
        </section>
    </main>

    <script type="module" src="{% static 'buscador/buscador.django.js' %}"></script>

</body>
</html>
